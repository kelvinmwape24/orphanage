{% extends "base.html" %}
{% block title %}Add Child{% endblock %}
{% block content %}
<div class="container" style="max-width:600px; padding:40px 0;">
    <h2>➕ Add a New Child</h2>
    <form method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" required min="1" max="18">
        </div>
        <div class="form-group">
            <label>Gender</label>
            <select name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>
        <div class="form-group">
            <label>School Grade</label>
            <input type="text" name="school_grade" placeholder="e.g. Grade 5">
        </div>
        <div class="form-group">
            <label>Location Found</label>
            <input type="text" name="location" placeholder="e.g. Lusaka, Zambia">
        </div>
        <div class="form-group">
            <label>Upload Photo</label>
            <input type="file" name="photo" accept="image/*">
        </div>
        <div class="form-group">
            <label>Story / Background</label>
            <textarea name="story" required></textarea>
        </div>
        <button type="submit" class="submit-btn">Save Child</button>
    </form>
</div>
{% endblock %}
