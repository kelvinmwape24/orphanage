{% extends "base.html" %}
{% block title %}Gallery{% endblock %}
{% block content %}
<div class="container" style="padding:60px 0;">
    <h1 style="text-align:center; font-size:3rem; color:#2c3e50;">Photo Gallery</h1>
    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:20px; margin-top:40px;">
        {% for child in children %}
        <div style="background:white; border-radius:15px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
            <img src="{{ url_for('uploaded_file', filename=child.photo_filename) }}" style="width:100%; height:250px; object-fit:cover;">
            <div style="padding:15px;">
                <h3>{{ child.name }}</h3>
                <p>Age {{ child.age }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
