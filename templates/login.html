<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - KM Orphanage</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="background:linear-gradient(135deg, #2c3e50, #3498db); display:flex; justify-content:center; align-items:center; height:100vh;">
    <div style="background:white; padding:40px; border-radius:15px; box-shadow:0 20px 50px rgba(0,0,0,0.3); max-width:400px; width:100%; text-align:center;">
        <h2 style="color:#2c3e50; margin-bottom:20px;">🔐 Admin Login</h2>
        <form method="post">
            <input type="password" name="password" placeholder="Enter admin password" required style="width:100%; padding:15px; border:2px solid #e0e0e0; border-radius:10px; margin-bottom:20px; font-size:1rem;">
            <button type="submit" style="background:#2c3e50; color:white; padding:15px; border:none; border-radius:10px; font-size:1.1rem; width:100%; cursor:pointer;">Login</button>
        </form>
        <p style="margin-top:15px; color:#7f8c8d;"><small>Authorized only</small></p>
    </div>
</body>
</html>
